services:
  db:
    image: postgres:18-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_password
      POSTGRES_DB: center_management
    # Host port 5433 avoids clashing with a local PostgreSQL on 5432.
    ports:
      - "5433:5432"
    # Postgres 18+ images expect the volume at /var/lib/postgresql (the parent),
    # not /var/lib/postgresql/data.
    volumes:
      - cms_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d center_management"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cms_pgdata:
