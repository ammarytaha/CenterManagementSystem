services:
  db:
    image: postgres:18-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_password
      POSTGRES_DB: center_management
    ports:
      - "5432:5432"
    volumes:
      - cms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d center_management"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cms_pgdata:
